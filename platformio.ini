[platformio]
src_dir = main
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc1-n16r8
framework = espidf
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -Wall
    -Wextra
